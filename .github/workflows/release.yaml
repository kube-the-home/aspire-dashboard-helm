name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    uses: kube-the-home/github-actions/.github/workflows/semantic-release.yaml@2b44df6e69f5674627ef7a7b3c0ddd752781e6f3 # v1.4.6
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}

  helm:
    needs: release
    if: needs.release.outputs.new_version != ''
    uses: kube-the-home/github-actions/.github/workflows/helm-release.yaml@2b44df6e69f5674627ef7a7b3c0ddd752781e6f3 # v1.4.6
    with:
      chart_path: charts/aspire-dashboard
      version: ${{ needs.release.outputs.new_version }}
      helm_dependency_repos: |
        opentelemetry-collector https://open-telemetry.github.io/opentelemetry-helm-charts
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}
